name: Sync DNS Records

on:
  push:
    branches:
      - main
    paths:
      - "domains/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print changes without applying)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  sync:
    name: Sync records to Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate all domain files before syncing
        run: python scripts/validate.py

      - name: Sync records to Cloudflare DNS
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/sync.py
